hannahvanderh:
  username: hannahvanderh
  name: Hannah VanderHoeven
  location: Salt Lake City, UT
  email:
  url_full:
  url:
  bio: Hannah is a Ph.D. student at Colorado State University. Her research with the Situated Grounding and Natural Language (SIGNAL) Lab focuses mainly on multimodal feature processing and their applications in human computer interaction. She’s interested in investigating how gesture semantics, when standalone or combined with other communicative features, can impact assumptions or features made available to an agent—specifically, leveraging pragmatics to help determine how multimodality can be used to effectively communicate the optimal amount of information to a listener. In addition to educational experience, Hannah has 9 years of industry experience working as a software engineer, with an emphasis on user interface and design. Her job has provided experience designing, writing, and maintaining graphical user interfaces that support various hardware systems and customers. Hannah also has a passion for education and mentoring. Throughout her professional and educational career, she has consistently looked for teaching and volunteer opportunities, including mentoring junior engineers at her job and volunteering at a local elementary school teaching coding to children.
  assets: assets/images/spring24/vanderhoeven.png
  
