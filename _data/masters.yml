  bio: Eric is a Graduate Student in Computer Science at Colorado State University. He holds two bachelors in Computer Science and Engineering from CSU, and is currently a Principal Engineer at Charter Communications. With a passion for all things computing, he has extensive experience building everything from circuits to robots to servers. His research focuses on language, philosphy and making artificial intelligence a little more intelligent. In his free time you can find him riding his bike, writing a science fiction novel or making sure the factory continues to grow.
